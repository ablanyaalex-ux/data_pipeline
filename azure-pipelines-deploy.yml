trigger:
  branches:
    include:
      - main
pr: none
pool:
  vmImage: "ubuntu-latest"
steps:
  - task: UsePythonVersion@0
    inputs:
      versionSpec: "3.12"
    displayName: "Set up Python"
  - task: AzureCLI@2
    displayName: "Deploy Fabric Pipeline"
    inputs:
      azureSubscription: "Data_Engineering_Pipeline"
      scriptType: "bash"
      scriptLocation: "inlineScript"
      inlineScript: |
        export UV_PROJECT_ENVIRONMENT=$(python -c "import sys; print(sys.prefix)")
        make install
        python scripts/pipeline_deploy.py \
          --workspace "TAG_Prod_DE" \
          --lakehouse "TAG_DE_Lakehouse" \
          --environment "data_pipeline" \
          --pipeline-name "data_pipeline" \
          --key-vault-url "https://tag-prod-de-kv.vault.azure.net" \
          --schedule "0 2 * * *"
